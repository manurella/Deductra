minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
      - id: documentation
        name: documentation
        entry: uv run python scripts/check_docs.py
        language: system
        pass_filenames: false
        files: (^|/)scripts/check_docs\.py$|\.md$
      - id: conventional-commit
        name: conventional commit
        entry: uv run python scripts/check_conventions.py --commit-msg-file
        language: system
        pass_filenames: true
        stages: [commit-msg]
