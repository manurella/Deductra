name: Change proposal
description: Propose a bounded, reviewable change to Deductra.
title: ""
labels: []
body:
  - type: markdown
    attributes:
      value: Thank you for proposing a focused improvement to Deductra.
  - type: input
    id: identifier
    attributes:
      label: Change identifier
      description: Optional issue, milestone, or packet identifier.
      placeholder: EXEC-003
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: State one concrete outcome.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Explain why this change is needed now.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: List the files and behavior expected to change.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Explicit boundaries
      description: List behavior and files that must remain unchanged.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List the commands and evidence that will prove completion.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risks and rollback
      description: Describe likely failure modes and how the change can be reverted safely.
    validations:
      required: true
